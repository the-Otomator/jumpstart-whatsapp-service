# ─────────────────────────────────────────────────────────────────
# nginx.conf — wa.otomator.pro
#
# Architecture: Cloudflare proxy (orange cloud ON) → this Nginx → Docker :3001
#
# SSL is terminated at Cloudflare.
# Cloudflare SSL mode: "Full"  (CF connects to origin via HTTPS)
# Origin listens on both 80 (redirect) and 443 (with self-signed cert).
#
# To create the self-signed cert on the server:
#   openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout /etc/nginx/ssl/wa.key \
#     -out /etc/nginx/ssl/wa.crt \
#     -subj "/CN=wa.otomator.pro"
#
# ⚠️  Do NOT use Certbot/Let's Encrypt here — Let's Encrypt HTTP-01 challenge
#     does not work when Cloudflare proxy is enabled.
# ─────────────────────────────────────────────────────────────────

# Trust Cloudflare IP ranges — get real visitor IP from CF-Connecting-IP
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header CF-Connecting-IP;

# ── HTTP → redirect to HTTPS ──────────────────────────────────────
server {
    listen 80;
    server_name wa.otomator.pro;
    return 301 https://$host$request_uri;
}

# ── HTTPS (self-signed cert, Cloudflare Full mode) ────────────────
server {
    listen 443 ssl;
    server_name wa.otomator.pro;

    # Self-signed cert — valid for Cloudflare "Full" mode
    # (Cloudflare validates cert is present, not that it's CA-signed)
    ssl_certificate     /etc/nginx/ssl/wa.crt;
    ssl_certificate_key /etc/nginx/ssl/wa.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Content-Type-Options  "nosniff";
    add_header X-XSS-Protection        "1; mode=block";
    add_header Referrer-Policy         "strict-origin-when-cross-origin";

    # Limit upload size (media messages / base64 images)
    client_max_body_size 16M;

    # ── Proxy to Docker container (localhost only) ──────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket support (Baileys uses WS)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts — important for QR long-polling
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }
}
