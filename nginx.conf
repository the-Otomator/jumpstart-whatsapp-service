server {
    listen 80;
    server_name wa.otomator.pro;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name wa.otomator.pro;

    # SSL managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/wa.otomator.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wa.otomator.pro/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Limit upload size (media messages)
    client_max_body_size 16M;

    # Proxy to Docker container (localhost only)
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts — important for QR polling
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
